<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIMESHEET — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #242930;
      color: #e4eaee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 4px;
      color: #e4eaee;
      margin-bottom: 6px;
    }

    .login-tagline {
      text-align: center;
      color: #8b97a2;
      font-size: 13px;
      margin-bottom: 40px;
    }

    .login-card {
      background: #2c323a;
      border: 1px solid #3a444e;
      border-radius: 10px;
      padding: 36px 32px;
    }

    .login-heading {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .login-sub {
      color: #8b97a2;
      font-size: 13px;
      margin-bottom: 28px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px 16px;
      background: #03a9f4;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .btn-google:hover { background: #0288d1; }

    .btn-google:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-google svg { flex-shrink: 0; }

    .login-error {
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.3);
      border-radius: 6px;
      color: #ef9a9a;
      font-size: 13px;
      display: none;
    }

    .login-error.visible { display: block; }

    .login-footer {
      text-align: center;
      color: #8b97a2;
      font-size: 11px;
      margin-top: 20px;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20%  { content: ''; }
      40%      { content: '.'; }
      60%      { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">TIMESHEET</div>
    <div class="login-tagline">Time tracking for teams</div>

    <div class="login-card">
      <div class="login-heading">Sign in</div>
      <div class="login-sub">Use your Google account to continue</div>

      <button class="btn-google" id="btn-signin">
        <!-- Google icon -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71C3.786 10.17 3.682 9.593 3.682 9s.104-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        <span id="btn-label">Continue with Google</span>
      </button>

      <div class="login-error" id="login-error"></div>
      <div class="login-footer">By signing in, you agree to the workspace terms</div>
    </div>
  </div>

  <script type="module">
    import { signInWithGoogle, loadSession, getAuthError } from './js/auth.js';
    import { supabase } from './js/config.js';

    const btn   = document.getElementById('btn-signin');
    const label = document.getElementById('btn-label');
    const errEl = document.getElementById('login-error');

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.classList.add('visible');
    }

    // Surface any OAuth error returned in the URL (e.g. redirect_uri mismatch)
    const urlErr = new URLSearchParams(
      window.location.search + '&' + window.location.hash.replace('#', '')
    );
    if (urlErr.get('error') || urlErr.get('error_description')) {
      showErr('OAuth error: ' + (urlErr.get('error_description') || urlErr.get('error')));
    }

    // DIAGNOSTIC: if we arrived here WITH an OAuth code in the URL, that means
    // Supabase redirected to the Site URL (index.html) instead of app.html —
    // i.e. app.html is not in the Redirect URLs allow-list. Surface that clearly.
    const landedWithCode = /[?&#](code|access_token)=/.test(window.location.href);

    // Redirect if already logged in (or if we just completed OAuth here)
    loadSession().then(profile => {
      if (profile) {
        window.location.href = 'app.html';
      } else if (landedWithCode) {
        showErr(
          'Signed in with Google, but no session/profile here. Likely cause: ' +
          '"http://localhost:3030/app.html" is missing from Supabase → Authentication → ' +
          'URL Configuration → Redirect URLs. Reason: ' + (getAuthError() || 'unknown')
        );
      }
    });

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      label.textContent = 'Redirecting';
      label.classList.add('loading-dots');
      errEl.classList.remove('visible');
      try {
        await signInWithGoogle();
        // Browser will redirect; spinner stays until redirect
      } catch (err) {
        btn.disabled = false;
        label.textContent = 'Continue with Google';
        label.classList.remove('loading-dots');
        errEl.textContent = err.message || 'Sign-in failed. Please try again.';
        errEl.classList.add('visible');
      }
    });
  </script>
</body>
</html>
